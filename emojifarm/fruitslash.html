<!doctype html>
<html lang="ms">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Ninja Buah Emoji</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: #1a1a1a;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        touch-action: none;
        user-select: none;
      }
      #game-container {
        position: relative;
        width: 100vw;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: radial-gradient(circle, #2c3e50 0%, #000000 100%);
      }
      canvas {
        display: block;
        cursor: crosshair;
      }
      .ui-layer {
        position: absolute;
        top: 20px;
        left: 20px;
        right: 20px;
        pointer-events: none;
        display: flex;
        justify-content: space-between;
        color: white;
        font-size: 24px;
        font-weight: bold;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
      }
      .lives {
        color: #ff4757;
      }
      #menu,
      #game-over {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(0, 0, 0, 0.85);
        padding: 40px;
        border-radius: 20px;
        text-align: center;
        color: white;
        border: 2px solid #f1c40f;
        z-index: 100;
      }
      .btn {
        background: #f1c40f;
        color: #000;
        border: none;
        padding: 15px 40px;
        font-size: 20px;
        font-weight: bold;
        border-radius: 50px;
        cursor: pointer;
        margin-top: 20px;
        transition:
          transform 0.2s,
          background 0.2s;
        pointer-events: auto;
      }
      .btn:hover {
        transform: scale(1.1);
        background: #f39c12;
      }
      .damage-flash {
        animation: flash 0.3s ease-out;
      }

      @keyframes flash {
        0% {
          box-shadow: inset 0 0 0 10px rgba(255, 0, 0, 0.7);
        }
        100% {
          box-shadow: inset 0 0 0 0 rgba(255, 0, 0, 0);
        }
      }

      /* Hand Tracking Styles */
      #video-container {
        display: none;
      }
      #webcam {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      #hand-canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }
      #status-indicator {
        position: absolute;
        top: 10px;
        background: rgba(0, 0, 0, 0.7);
        color: #f1c40f;
        padding: 5px 10px;
        border-radius: 5px;
        font-size: 12px;
        z-index: 51;
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <div class="ui-layer">
        <div id="score-display">Skor: 0</div>
        <div id="lives-display" class="lives"></div>
      </div>

      <!-- Menu Utama -->
      <div id="menu">
        <h1 class="text-4xl mb-4 font-black">FRUIT SLASHER</h1>
        <p class="mb-6">Slice fruit, avoid bomb! 🍎💣</p>
        <button class="btn" onclick="startGame()">START</button>
      </div>

      <!-- Game Over -->
      <div id="game-over" class="hidden">
        <h1 class="text-4xl mb-4 font-black text-red-500">GAME OVER</h1>
        <p id="final-score" class="text-2xl mb-6">Final Score: 0</p>
        <button class="btn" onclick="resetGame()">RETRY</button>
      </div>

      <canvas id="gameCanvas"></canvas>

      <!-- Hand Tracking UI -->
      <div id="status-indicator">Inisialisasi Kamera...</div>
      <div id="video-container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="hand-canvas"></canvas>
      </div>
    </div>

    <script type="module">
      import {
        HandLandmarker,
        FilesetResolver,
      } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0";

      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");
      const scoreElement = document.getElementById("score-display");
      const livesElement = document.getElementById("lives-display");
      const menu = document.getElementById("menu");
      const gameOverScreen = document.getElementById("game-over");
      const finalScoreElement = document.getElementById("final-score");
      const gameContainer = document.getElementById("game-container");
      const video = document.getElementById("webcam");
      const handCanvas = document.getElementById("hand-canvas");
      const handCtx = handCanvas.getContext("2d");
      const statusIndicator = document.getElementById("status-indicator");

      // MediaPipe Setup
      let handLandmarker = undefined;
      let runningMode = "VIDEO";
      let lastVideoTime = -1;
      let frameCount = 0; // Untuk frame skipping

      // Navigation Setup
      let hoverTarget = null;
      let hoverStartTime = 0;
      const HOVER_DURATION = 1000; // ms

      // Konfigurasi Permainan

      // Konfigurasi Permainan
      let score = 0;
      let lives = 3;
      const MAX_LIVES = 3;
      let gameActive = false;
      let fruits = [];
      let particles = [];
      let trail = [];
      let lastTime = 0;
      let spawnTimer = 0;
      let spawnRate = 1500; // ms

      const EMOJIS = ["🍎", "🍊", "🍋", "🍉", "🍇", "🍓", "🍍", "🥥"];
      const BOMB_EMOJI = "💣";
      const LIFE_HEART_EMOJI = "❤️";

      class Fruit {
        constructor() {
          const rand = Math.random();
          this.isBomb = false;
          this.isLife = false;

          if (rand < 0.05 && score > 50) {
            this.isLife = true;
            this.emoji = LIFE_HEART_EMOJI;
          } else if (rand < 0.2) {
            this.isBomb = true;
            this.emoji = BOMB_EMOJI;
          } else {
            this.emoji = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
          }

          this.radius = 35;
          this.x = Math.random() * (canvas.width - 200) + 100;
          this.y = canvas.height + this.radius;

          const side = this.x < canvas.width / 2 ? "left" : "right";
          this.vx =
            side === "left" ? Math.random() * 3 + 2 : -(Math.random() * 3 + 2);
          this.vy = -(Math.random() * 6 + 13);
          this.gravity = 0.25;
          this.rotation = 0;
          this.rotationSpeed = (Math.random() - 0.5) * 0.1;
          this.sliced = false;
        }

        update() {
          this.vy += this.gravity;
          this.x += this.vx;
          this.y += this.vy;
          this.rotation += this.rotationSpeed;

          if (
            (this.x - this.radius < 0 && this.vx < 0) ||
            (this.x + this.radius > canvas.width && this.vx > 0)
          ) {
            this.vx *= -1;
          }
        }

        draw() {
          ctx.save();
          ctx.translate(this.x, this.y);
          ctx.rotate(this.rotation);
          ctx.font = `${this.radius * 2}px Arial`;
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.shadowBlur = 10;
          ctx.shadowColor = "rgba(0,0,0,0.5)";
          ctx.fillText(this.emoji, 0, 0);
          ctx.restore();
        }
      }

      class Particle {
        constructor(x, y, color, text = null) {
          this.x = x;
          this.y = y;
          this.vx = (Math.random() - 0.5) * 8;
          this.vy = (Math.random() - 0.5) * 8;
          this.alpha = 1;
          this.color = color;
          this.text = text;
          this.initialSize = this.text ? 20 : Math.random() * 6 + 3;
          this.size = this.initialSize;
        }

        update() {
          this.x += this.vx;
          this.y += this.vy;
          this.alpha -= 0.025;
          if (!this.text) {
            this.size = this.initialSize * Math.max(0, this.alpha);
          }
        }

        draw() {
          ctx.save();
          ctx.globalAlpha = this.alpha;
          ctx.fillStyle = this.color;
          if (this.text) {
            ctx.font = `${this.size}px Arial`;
            ctx.fillText(this.text, this.x, this.y);
          } else {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.restore();
        }
      }

      function triggerDamageEffect() {
        gameContainer.classList.add("damage-flash");
        setTimeout(() => gameContainer.classList.remove("damage-flash"), 300);
      }

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      window.addEventListener("resize", resize);

      function addTrail(e) {
        let x, y;
        if (e.isHand) {
          x = e.x;
          y = e.y;
        } else {
          const rect = canvas.getBoundingClientRect();
          x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
          y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
        }
        trail.push({ x, y, time: Date.now() });
      }

      function checkSlice(e) {
        if (!gameActive) return;
        let x, y;
        if (e.isHand) {
          x = e.x;
          y = e.y;
        } else {
          const rect = canvas.getBoundingClientRect();
          x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
          y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
        }

        fruits.forEach((fruit) => {
          const dist = Math.hypot(fruit.x - x, fruit.y - y);
          if (dist < fruit.radius) {
            sliceFruit(fruit);
          }
        });
      }

      function sliceFruit(fruit) {
        if (fruit.sliced) return;
        fruit.sliced = true;

        if (fruit.isLife) {
          if (lives < MAX_LIVES) {
            lives++;
            particles.push(new Particle(fruit.x, fruit.y, "#FFFFFF", "+1 ❤️"));
          } else {
            score += 5; // Bonus points
          }
          createExplosion(fruit.x, fruit.y, "#ff80ed"); // Pink explosion
        } else if (fruit.isBomb) {
          triggerDamageEffect();
          createExplosion(fruit.x, fruit.y, "#ff4757");
          particles.push(new Particle(fruit.x, fruit.y, "#FFFFFF", "BOMB!"));
          lives--;
          if (lives <= 0) endGame();
        } else {
          // It's a fruit
          score += 1;
          spawnRate = Math.max(600, 1500 - score / 2);
          createExplosion(fruit.x, fruit.y, "#f1c40f");
        }

        updateUI();

        setTimeout(() => {
          const idx = fruits.indexOf(fruit);
          if (idx > -1) fruits.splice(idx, 1);
        }, 100);
      }

      function createExplosion(x, y, color) {
        for (let i = 0; i < 15; i++) {
          particles.push(new Particle(x, y, color));
        }
      }

      function updateUI() {
        scoreElement.innerText = `Score: ${score}`;
        let hearts = "";
        for (let i = 0; i < lives; i++) hearts += "❤️";
        for (let i = lives; i < MAX_LIVES; i++) hearts += "🖤";
        livesElement.innerHTML = `Life: ${hearts}`;
      }

      function startGame() {
        score = 0;
        lives = 3;
        fruits = [];
        particles = [];
        gameActive = true;
        spawnRate = 1500;
        menu.classList.add("hidden");
        gameOverScreen.classList.add("hidden");
        resize(); // Initial resize
        updateUI();
        // gameLoop is now persistent
      }

      function endGame() {
        gameActive = false;
        finalScoreElement.innerText = `Final Score: ${score}`;
        gameOverScreen.classList.remove("hidden");
      }

      function resetGame() {
        startGame();
      }

      // Hand Tracking Logic
      async function setupHandTracking() {
        try {
          const vision = await FilesetResolver.forVisionTasks(
            "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm",
          );
          handLandmarker = await HandLandmarker.createFromOptions(vision, {
            baseOptions: {
              modelAssetPath: `https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task`,
              delegate: "GPU",
            },
            runningMode: runningMode,
            numHands: 1,
          });
          statusIndicator.innerText = "Camera Ready!";
          startCamera();
        } catch (error) {
          console.error("Gagal inisialisasi hand tracking:", error);
          statusIndicator.innerText = "Failed to load AI Hand Tracking";
        }
      }

      function startCamera() {
        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
          navigator.mediaDevices
            .getUserMedia({ video: { width: 320, height: 240 } })
            .then((stream) => {
              video.srcObject = stream;
              video.addEventListener("loadeddata", predictWebcam);
            })
            .catch((err) => {
              console.error("Gagal akses kamera:", err);
              statusIndicator.innerText = "Failed to access camera";
            });
        }
      }

      async function predictWebcam() {
        if (!handLandmarker) return;

        // Skip frame: Hanya proses deteksi setiap 2 frame sekali
        // untuk menghemat CPU/GPU (mengurangi lag)
        frameCount++;
        if (frameCount % 2 === 0 && video.currentTime !== lastVideoTime) {
          lastVideoTime = video.currentTime;
          const results = handLandmarker.detectForVideo(
            video,
            performance.now(),
          );

          handCtx.clearRect(0, 0, handCanvas.width, handCanvas.height);
          if (results.landmarks && results.landmarks.length > 0) {
            statusIndicator.innerText = "Hand Detected!";
            const landmarks = results.landmarks[0];

            // Deteksi Jari Telunjuk (Landmark 8)
            const indexFinger = landmarks[8];

            // Kalibrasi Koordinat dengan Safe Margin (0.1 - 0.9)
            // Ini membantu menjangkau pojok layar (terutama bawah) tanpa harus
            // menggerakkan tangan secara ekstrem ke pinggir jangkauan kamera.
            const margin = 0.15; // 15% margin di setiap sisi
            const scale = 1 / (1 - 2 * margin);

            // Hitung Raw X & Y dengan margin dan scaling
            let rawX = (indexFinger.x - margin) * scale;
            let rawY = (indexFinger.y - margin) * scale;

            // Mirroring X (karena kamera kita mirrored)
            // Dan konversi ke koordinat layar (Canvas)
            let x = (1 - rawX) * canvas.width;
            let y = rawY * canvas.height;

            // Clamp: Pastikan kursor tetap berada di dalam area game
            x = Math.max(0, Math.min(canvas.width, x));
            y = Math.max(0, Math.min(canvas.height, y));

            // Trigger slicing
            const mockEvent = { isHand: true, x, y };
            addTrail(mockEvent); // Always add trail for persistent visual

            if (gameActive) {
              checkSlice(mockEvent);
            } else {
              handleButtonHover(x, y);
            }

            // Draw pointer in preview (even if hidden container, used internally for drawing to hidden canvas if needed)
            drawHandPreview(landmarks);
          } else {
            statusIndicator.innerText = "Move your hand towards the camera";
          }
        }
        window.requestAnimationFrame(predictWebcam);
      }

      function drawHandPreview(landmarks) {
        handCanvas.width = video.videoWidth;
        handCanvas.height = video.videoHeight;
        handCtx.fillStyle = "#f1c40f";
        // Draw index finger only in preview
        const indexFinger = landmarks[8];
        handCtx.beginPath();
        handCtx.arc(
          indexFinger.x * handCanvas.width,
          indexFinger.y * handCanvas.height,
          8,
          0,
          Math.PI * 2,
        );
        handCtx.fill();
      }

      // Initialize Tracking
      resize(); // Pastikan ukuran canvas benar sejak awal

      // Deteksi HP: Jangan aktifkan hand tracking jika di HP
      const isMobile =
        /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(
          navigator.userAgent,
        ) || window.innerWidth <= 800;

      if (!isMobile) {
        setupHandTracking();
      } else {
        statusIndicator.style.display = "none";
        console.log("Hand tracking disabled on mobile device.");
      }

      // Start persistent game loop
      requestAnimationFrame(gameLoop);

      // Expose to window for HTML buttons
      window.startGame = startGame;
      window.resetGame = resetGame;

      function handleButtonHover(x, y) {
        const activeScreen = [menu, gameOverScreen].find(
          (s) => !s.classList.contains("hidden"),
        );
        if (!activeScreen) return;

        const btn = activeScreen.querySelector(".btn");
        if (!btn) return;

        const rect = btn.getBoundingClientRect();
        const padding = 20; // Tolerance

        if (
          x >= rect.left - padding &&
          x <= rect.right + padding &&
          y >= rect.top - padding &&
          y <= rect.bottom + padding
        ) {
          if (hoverTarget !== btn) {
            hoverTarget = btn;
            hoverStartTime = Date.now();
          }

          const progress = Math.min(
            1,
            (Date.now() - hoverStartTime) / HOVER_DURATION,
          );
          btn.style.transform = `scale(${1 + progress * 0.2})`;
          btn.style.background = `linear-gradient(90deg, #f39c12 ${progress * 100}%, #f1c40f ${progress * 100}%)`;

          if (progress >= 1) {
            btn.click();
            hoverTarget = null;
            btn.style.transform = "";
            btn.style.background = "";
          }
        } else {
          if (hoverTarget === btn) {
            hoverTarget = null;
            btn.style.transform = "";
            btn.style.background = "";
          }
        }
      }

      function drawTrail() {
        if (trail.length < 2) return;
        ctx.beginPath();
        ctx.strokeStyle = "rgba(255, 255, 255, 0.8)";
        ctx.lineWidth = 5;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";

        const now = Date.now();
        trail = trail.filter((p) => now - p.time < 150);
        if (trail.length < 2) return;
        ctx.moveTo(trail[0].x, trail[0].y);
        for (let i = 1; i < trail.length; i++) {
          ctx.lineTo(trail[i].x, trail[i].y);
        }
        ctx.stroke();
      }

      let isDrawing = false;
      const handleStart = (e) => {
        isDrawing = true;
        addTrail(e);
      };
      const handleMove = (e) => {
        if (isDrawing) {
          addTrail(e);
          checkSlice(e);
        }
      };
      const handleEnd = () => {
        isDrawing = false;
      };

      function gameLoop(timestamp) {
        const deltaTime = timestamp - lastTime;
        lastTime = timestamp;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (gameActive) {
          spawnTimer += deltaTime;
          if (spawnTimer > spawnRate) {
            fruits.push(new Fruit());
            if (score > 100 && Math.random() > 0.7) fruits.push(new Fruit());
            spawnTimer = 0;
          }

          for (let i = fruits.length - 1; i >= 0; i--) {
            const fruit = fruits[i];
            fruit.update();
            fruit.draw();

            if (fruit.y > canvas.height + 100) {
              if (!fruit.isBomb && !fruit.isLife && !fruit.sliced) {
                triggerDamageEffect();
                lives--;
                particles.push(
                  new Particle(fruit.x, canvas.height - 20, "#ff4757", "MISS!"),
                );
                updateUI();
                if (lives <= 0) endGame();
              }
              fruits.splice(i, 1);
            }
          }
        }

        for (let i = particles.length - 1; i >= 0; i--) {
          const particles_ref = particles[i];
          particles_ref.update();
          particles_ref.draw();
          if (particles_ref.alpha <= 0) particles.splice(i, 1);
        }

        drawTrail();
        requestAnimationFrame(gameLoop);
      }

      canvas.addEventListener("mousedown", handleStart);
      window.addEventListener("mousemove", handleMove);
      window.addEventListener("mouseup", handleEnd);
      canvas.addEventListener(
        "touchstart",
        (e) => {
          e.preventDefault();
          handleStart(e);
        },
        { passive: false },
      );
      window.addEventListener(
        "touchmove",
        (e) => {
          e.preventDefault();
          handleMove(e);
        },
        { passive: false },
      );
      window.addEventListener("touchend", handleEnd);
    </script>
  </body>
</html>
